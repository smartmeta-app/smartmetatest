name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prevents KSP/IntelliJ-platform internals from trying to initialize
      # an AWT event queue on headless CI runners (no display available),
      # which otherwise crashes with a NullPointerException.
      JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # This project ships without a checked-in Gradle wrapper, so Gradle is
      # provisioned directly by the setup-gradle action instead of ./gradlew.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current
          cache-read-only: false

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      # app/build.gradle.kts points the "debugConfig" signing config at
      # ./debug.keystore, which is intentionally .gitignore'd. Generate a
      # standard Android debug keystore so the build can sign the debug APK.
      - name: Generate debug keystore
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # The Secrets Gradle Plugin requires .env.example to exist as its
      # fallback properties file. Create it if it's missing from the repo
      # (e.g. not committed) so project configuration doesn't fail.
      - name: Ensure .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env.example
          fi

      # No GitHub secrets are used. The Secrets Gradle Plugin reads
      # GEMINI_API_KEY from .env, and since .env is not created here, it
      # automatically falls back to the placeholder value in .env.example.
      # The build compiles fine with that placeholder.
      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smartmeta-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
